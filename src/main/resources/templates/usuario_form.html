<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title th:text="${modoEdicion} ? 'Actualizar Usuario' : 'Registro de Usuario'">Registro de Usuario</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3 class="mb-0"
                th:text="${modoEdicion} ? 'Actualizar Usuario' : 'Registro de Usuario'">
                Registro de Usuario
            </h3>

        </div>

        <div class="card-body">

            <div
                    th:if="${mensaje}"
                    class="alert alert-danger"
                    th:text="${mensaje}">
            </div>

            <form th:action="@{/usuario/guardar}"
                  th:object="${usuario}"
                  method="post">

                <input type="hidden"
                       name="modoEdicion"
                       th:value="${modoEdicion}">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Identificación
                        </label>

                        <input
                                type="number"
                                class="form-control"
                                th:field="*{identificacion}"
                                th:readonly="${modoEdicion}"
                                required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Nombre
                        </label>

                        <input
                                type="text"
                                class="form-control"
                                th:field="*{nombre}"
                                required>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Primer Apellido
                        </label>

                        <input
                                type="text"
                                class="form-control"
                                th:field="*{primerApellido}"
                                required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Segundo Apellido
                        </label>

                        <input
                                type="text"
                                class="form-control"
                                th:field="*{segundoApellido}"
                                required>

                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Correo Electrónico
                    </label>

                    <input
                            type="email"
                            class="form-control"
                            th:field="*{correoElectronico}"
                            required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Teléfono
                    </label>

                    <input
                            type="text"
                            class="form-control"
                            th:field="*{telefono}"
                            required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Rol
                    </label>

                    <select
                            class="form-select"
                            th:field="*{rol}">

                        <option value="ADMINISTRADOR">
                            Administrador
                        </option>

                        <option value="BIBLIOTECARIO">
                            Bibliotecario
                        </option>

                        <option value="ESTUDIANTE">
                            Estudiante
                        </option>

                    </select>

                </div>

                <div class="mb-4" th:unless="${modoEdicion}">

                    <label class="form-label">
                        Contraseña
                    </label>

                    <input
                            type="password"
                            class="form-control"
                            th:field="*{contrasena}"
                            required>

                </div>

                <button
                        type="submit"
                        class="btn btn-success"
                        th:text="${modoEdicion} ? 'Actualizar Usuario' : 'Guardar Usuario'">
                    Guardar Usuario
                </button>

                <a th:href="@{/usuarios}"
                   class="btn btn-secondary">
                    Cancelar
                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
