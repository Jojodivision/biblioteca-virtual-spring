<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Fidélitas | Iniciar Sesión</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd 0%, #20c997 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="d-flex align-items-center py-4">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-5">
                        
                        <div class="text-center mb-4">
                            <h2 class="fw-bold text-primary mb-1">📚 Biblioteca</h2>
                            <p class="text-muted small">Ingresa tus credenciales universitarias</p>
                        </div>
                        
                        <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show small py-2" role="alert">
                            Usuario o contraseña incorrectos.
                        </div>
                        
                        <div th:if="${param.logout}" class="alert alert-success alert-dismissible fade show small py-2" role="alert">
                            Has cerrado sesión correctamente.
                        </div>
                        
                        <form th:action="@{/login}" method="post">
                            
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control rounded-3" id="username" name="username" placeholder="Usuario" required autocomplete="off">
                                <label for="username" class="text-muted">Nombre de usuario</label>
                            </div>
                            
                            <div class="form-floating mb-4">
                                <input type="password" class="form-control rounded-3" id="password" name="password" placeholder="Contraseña" required>
                                <label for="password" class="text-muted">Contraseña</label>
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button class="btn btn-primary btn-lg rounded-3 fw-bold shadow-sm" type="submit">
                                    Ingresar Sistema
                                </button>
                            </div>
                            
                        </form>
                        
                    </div>
                </div>
                
                <p class="mt-4 mb-0 text-center text-white-50 small">&copy; 2026 Desarrollo de Sistemas Fidélitas</p>
                
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
