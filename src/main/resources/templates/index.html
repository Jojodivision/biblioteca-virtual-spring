<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Fidélitas | Biblioteca Virtual</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">📚 Biblioteca Virtual</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">Bienvenido, Usuario</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-secondary">Catálogo de Libros</h2>
            <a th:href="@{/agregar}" class="btn btn-success">➕ Agregar Nuevo Libro</a>
        </div>
        
        <div class="card shadow-sm">
            <div class="card-body">
                
                <div th:if="${libros != null and !libros.empty}" class="table-responsive">
                    <table class="table table-hover table-striped align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Título</th>
                                <th>Autor</th>
                                <th>Editorial</th>
                                <th>Año</th>
                                <th>Stock</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="libro : ${libros}">
                                <td th:text="${libro.idLibro}">1</td>
                                <td th:text="${libro.titulo}" class="fw-bold">Título</td>
                                <td th:text="${libro.autor}">Autor</td>
                                <td th:text="${libro.editorial}">Editorial</td>
                                <td th:text="${libro.anioPublicacion}">2026</td>
                                <td>
                                    <span class="badge bg-primary rounded-pill" th:text="${libro.cantidad}">0</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div th:if="${libros == null or libros.empty}" class="alert alert-warning text-center" role="alert">
                    No hay libros registrados en el catálogo en este momento.
                </div>
                
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
