<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Usuarios</title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-dark text-white">

            <h3>Usuarios Registrados</h3>

        </div>

        <div class="card-body">

            <div
                    th:if="${mensaje}"
                    class="alert alert-success"
                    th:text="${mensaje}">
            </div>

            <div
                    th:if="${mensajeBusqueda}"
                    class="alert alert-warning"
                    th:text="${mensajeBusqueda}">
            </div>

            <a class="btn btn-success mb-3"
               th:href="@{/usuario/agregar}">

                Registrar Usuario

            </a>

            <div class="card mb-3">

                <div class="card-header">
                    Consultar Usuario
                </div>

                <div class="card-body">

                    <form th:action="@{/usuarios}" method="get" class="row g-2">

                        <div class="col-md-3">
                            <input
                                    type="text"
                                    class="form-control"
                                    name="identificacion"
                                    placeholder="Identificación"
                                    th:value="${identificacionBuscar}">
                        </div>

                        <div class="col-md-3">
                            <input
                                    type="text"
                                    class="form-control"
                                    name="nombre"
                                    placeholder="Nombre"
                                    th:value="${nombreBuscar}">
                        </div>

                        <div class="col-md-3">
                            <input
                                    type="text"
                                    class="form-control"
                                    name="correo"
                                    placeholder="Correo"
                                    th:value="${correoBuscar}">
                        </div>

                        <div class="col-md-3">
                            <button type="submit" class="btn btn-primary">
                                Buscar
                            </button>
                            <a th:href="@{/usuarios}" class="btn btn-outline-secondary">
                                Ver todos
                            </a>
                        </div>

                    </form>

                </div>

            </div>

            <table class="table table-bordered table-hover">

                <thead class="table-primary">

                <tr>

                    <th>Identificación</th>

                    <th>Nombre</th>

                    <th>Correo</th>

                    <th>Rol</th>

                    <th>Estado</th>

                    <th>Acciones</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="usuario : ${usuarios}">

                    <td th:text="${usuario.identificacion}"></td>

                    <td th:text="${usuario.nombre}+' '+${usuario.primerApellido}"></td>

                    <td th:text="${usuario.correo}"></td>

                    <td th:text="${usuario.rol}"></td>

                    <td th:text="${usuario.activo ? 'Activo' : 'Inactivo'}"></td>

                    <td>

                        <a class="btn btn-warning btn-sm"
                           th:href="@{'/usuario/modificar/' + ${usuario.identificacion}}">

                            Editar

                        </a>

                        <form
                                th:if="${usuario.activo}"
                                th:action="@{'/usuario/desactivar/' + ${usuario.identificacion}}"
                                method="post"
                                style="display:inline;"
                                onsubmit="return confirm('¿Desea desactivar este usuario?');">

                            <button type="submit" class="btn btn-danger btn-sm">
                                Desactivar
                            </button>

                        </form>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
