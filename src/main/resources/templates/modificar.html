<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Fidélitas | Modificar Libro</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">📚 Biblioteca Virtual</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                
                <div class="card shadow-sm">
                    <div class="card-header bg-secondary text-white">
                        <h4 class="mb-0">Datos del Libro</h4>
                    </div>
                    <div class="card-body">
                        
                        <form th:action="@{/guardar}" th:object="${libro}" method="post">
                            <input type="hidden" th:field="*{idLibro}"/>
                            
                            <div class="mb-3">
                                <label for="titulo" class="form-label fw-bold">Título:</label>
                                <input type="text" class="form-control" th:field="*{titulo}" required="true" placeholder="Ej. El Señor de los Anillos"/>
                            </div>
                            
                            <div class="mb-3">
                                <label for="autor" class="form-label fw-bold">Autor:</label>
                                <input type="text" class="form-control" th:field="*{autor}" required="true" placeholder="Ej. J.R.R. Tolkien"/>
                            </div>
                            
                            <div class="mb-3">
                                <label for="editorial" class="form-label fw-bold">Editorial:</label>
                                <input type="text" class="form-control" th:field="*{editorial}"/>
                            </div>
                            
                            <div class="row mb-4">
                                <div class="col">
                                    <label for="anioPublicacion" class="form-label fw-bold">Año de Publicación:</label>
                                    <input type="number" class="form-control" th:field="*{anioPublicacion}"/>
                                </div>
                                <div class="col">
                                    <label for="cantidad" class="form-label fw-bold">Cantidad Disponible:</label>
                                    <input type="number" class="form-control" th:field="*{cantidad}"/>
                                </div>
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">💾 Guardar Libro</button>
                                <a th:href="@{/}" class="btn btn-outline-secondary">Cancelar y volver</a>
                            </div>
                        </form>
                        
                    </div>
                </div>
                
            </div>
        </div>
    </div>

</body>
</html>
